<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval'; img-src * data: blob:;">
  <link rel="stylesheet" href="style.css">
  <title>Spotify Widget</title>
</head>

<body>

  <div class="widget-container" id="main-widget">

    <div class="main-content">

      <img id="album-art"
        src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAGQAAABkAQMAAABpTeRvAAAABlBMVEUAAAD///+l2Z/dAAAAAXRSTlMAQObYZgAAABxJREFUeJztwQENAAAAwqD3P20ON6AAAAAAAADg1w1vAAABa9e6YAAAAABJRU5ErkJggg=="
        alt="Album Art">

      <div class="song-details">
        <h1 id="track-title">Waiting for Media...</h1>
        <h2 id="artist-name">Play a song!</h2>

        <div class="progress-container">
          <div id="progress-bar" style="width: 0%;"></div>
        </div>

        <div class="time-container">
          <span id="current-time">0:00</span>
          <span id="total-time">0:00</span>
        </div>

        <div class="controls-container">
          <button class="control-btn" onclick="sendCommand('prev')">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="white">
              <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z" />
            </svg>
          </button>
          <button id="play-pause-btn" class="control-btn play-btn" onclick="sendCommand('toggle')">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="white">
              <path d="M8 5v14l11-7z" />
            </svg>
          </button>
          <button class="control-btn" onclick="sendCommand('next')">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="white">
              <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z" />
            </svg>
          </button>

          <div id="volume-wrapper" class="volume-wrapper">
            <button class="control-btn volume-btn" id="volume-btn" title="Adjust Volume">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="white">
                <path
                  d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z" />
              </svg>
            </button>
            <div id="volume-slider-container" class="volume-slider-container">
              <input type="range" id="volume-range" min="0" max="100" value="50" step="2">
            </div>
          </div>

          <button class="control-btn share-btn" onclick="shareTrack()" title="Copy to Clipboard">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="white">
              <path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z" />
            </svg>
          </button>
          <button class="control-btn toggle-lyrics-btn" onclick="toggleLyrics()" title="Show Lyrics">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="white" id="chevron-icon">
              <path d="M16.59 8.59L12 13.17 7.41 8.59 6 10l6 6 6-6z" />
            </svg>
          </button>
        </div>
      </div>
    </div>

    <div id="volume-slider-container" class="volume-slider-container">
      <div class="volume-track-vertical">
        <input type="range" id="volume-range" min="0" max="100" value="50" step="2">
      </div>
    </div>

    <div id="lyrics-drawer" class="lyrics-drawer">
      <div id="live-lyrics-container">
        <div id="lyrics-content">
        </div>
      </div>
    </div>

  </div>

  <script>
    const { ipcRenderer, clipboard } = require('electron');

    // 1. GAME LOOP VARIABLES
    let localProgress = 0;
    let currentDuration = 1000;
    let isPlaying = false;
    let lastFrameTime = Date.now();
    let isLyricsOpen = false;

    // Trackers to catch Spotify's lag
    let currentTrackTitle = "";
    let lastWindowsProgress = -1;

    const playIcon = '<svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg>';
    const pauseIcon = '<svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>';

    // 2. HELPER FUNCTIONS
    function formatTime(ms) {
      if (isNaN(ms) || ms <= 0) return "0:00";
      const totalSeconds = Math.floor(ms / 1000);
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = totalSeconds % 60;
      return `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
    }

    function updateVisuals() {
      document.getElementById('current-time').innerText = formatTime(localProgress);
      document.getElementById('total-time').innerText = formatTime(currentDuration);
      let percentage = (localProgress / currentDuration) * 100;
      if (percentage > 100) percentage = 100;
      document.getElementById('progress-bar').style.width = percentage + '%';
    }

    // 3. RECEIVE DATA FROM WINDOWS (THE IRONCLAD FILTER)
    ipcRenderer.on('update-track', (event, track) => {
      try {
        document.getElementById('track-title').innerText = track.title;
        document.getElementById('artist-name').innerText = track.artist;
        document.getElementById('album-art').src = track.albumArt;

        const btn = document.getElementById('play-pause-btn');
        btn.innerHTML = track.isPlaying ? pauseIcon : playIcon;

        currentDuration = track.duration;
        isPlaying = track.isPlaying;

        if (track.progress !== lastWindowsProgress || track.title !== currentTrackTitle) {
          const drift = Math.abs(track.progress - localProgress);

          if (track.title !== currentTrackTitle || drift > 3000) {
            localProgress = track.progress;

            if (track.title !== currentTrackTitle && isLyricsOpen) {
              setTimeout(() => fetchLyrics(), 500);
            }

            currentTrackTitle = track.title;
          }
          lastWindowsProgress = track.progress;
        }

      } catch (error) {
        console.error("UI Error:", error);
      }
    });

    // 4. THE 60FPS GAME LOOP
    function animateProgressBar() {
      const now = Date.now();
      const deltaTime = now - lastFrameTime;
      lastFrameTime = now;

      if (isPlaying && currentDuration > 0) {
        localProgress += deltaTime;
        if (localProgress > currentDuration) localProgress = currentDuration;
        updateVisuals();
      } else if (!isPlaying) {
        updateVisuals();
      }

      syncLyrics(); // Sync lyrics every frame
      requestAnimationFrame(animateProgressBar);
    }

    animateProgressBar();

    // 5. BUTTON CONTROLS
    function sendCommand(cmd) {
      ipcRenderer.send('media-command', cmd);
      if (cmd === 'toggle') {
        const btn = document.getElementById('play-pause-btn');
        isPlaying = !isPlaying;
        btn.innerHTML = isPlaying ? pauseIcon : playIcon;
      }
    }

    // 6. QUICK SHARE
    function shareTrack() {
      const title = document.getElementById('track-title').innerText;
      const artist = document.getElementById('artist-name').innerText;
      if (title !== "Waiting for Media..." && title !== "Waiting for Spotify...") {
        clipboard.writeText(`🎵 Vibing to: ${title} - ${artist}`);
        const shareBtn = document.querySelector('.share-btn');
        const originalIcon = shareBtn.innerHTML;
        shareBtn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="#1DB954"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>';
        setTimeout(() => { shareBtn.innerHTML = originalIcon; }, 1500);
      }
    }

    // 7. THE LYRICS ENGINE
    let currentLyrics = [];
    let activeLyricIndex = -1;
    let loadedTrackId = "";

    function toggleLyrics() {
      const drawer = document.getElementById('lyrics-drawer');
      const btn = document.querySelector('.toggle-lyrics-btn');

      isLyricsOpen = !isLyricsOpen;
      ipcRenderer.send('toggle-lyrics-window', isLyricsOpen);

      if (isLyricsOpen) {
        drawer.classList.add('expanded');
        btn.classList.add('open');
        if (loadedTrackId !== currentTrackTitle) {
          fetchLyrics();
        }
      } else {
        drawer.classList.remove('expanded');
        btn.classList.remove('open');
      }
    }

    async function fetchLyrics() {
      const title = document.getElementById('track-title').innerText;
      const artist = document.getElementById('artist-name').innerText;

      if (title === "Waiting for Media...") return;

      const contentDiv = document.getElementById('lyrics-content');
      contentDiv.innerHTML = '<p class="lyric-line active">Searching for lyrics...</p>';
      contentDiv.style.transform = `translateY(0px)`;

      try {
        const url = `https://lrclib.net/api/get?track_name=${encodeURIComponent(title)}&artist_name=${encodeURIComponent(artist)}`;
        const response = await fetch(url);

        if (!response.ok) throw new Error("Not found");
        const data = await response.json();

        if (data && data.syncedLyrics) {
          parseLyrics(data.syncedLyrics);
          loadedTrackId = currentTrackTitle;
        } else {
          contentDiv.innerHTML = '<p class="lyric-line active">No synced lyrics available</p>';
          currentLyrics = [];
        }
      } catch (err) {
        contentDiv.innerHTML = '<p class="lyric-line active">No lyrics found 😔</p>';
        currentLyrics = [];
      }
    }

    function parseLyrics(lrcString) {
      const lines = lrcString.split('\n');
      currentLyrics = [];
      const timeRegex = /\[(\d{2}):(\d{2})\.(\d{2,3})\]/;

      lines.forEach(line => {
        const match = timeRegex.exec(line);
        if (match) {
          const minutes = parseInt(match[1]);
          const seconds = parseInt(match[2]);
          let ms = parseInt(match[3]);
          if (match[3].length === 2) ms *= 10;

          const timeMs = (minutes * 60 * 1000) + (seconds * 1000) + ms;
          const text = line.replace(timeRegex, '').trim();

          if (text) currentLyrics.push({ time: timeMs, text: text });
        }
      });
      renderLyrics();
    }

    function renderLyrics() {
      const contentDiv = document.getElementById('lyrics-content');
      contentDiv.innerHTML = '';

      currentLyrics.forEach((lyric, index) => {
        const p = document.createElement('p');
        p.className = 'lyric-line';
        p.id = `lyric-${index}`;
        p.innerText = lyric.text;
        contentDiv.appendChild(p);
      });
      activeLyricIndex = -1;
    }

    function syncLyrics() {
      if (!isLyricsOpen || currentLyrics.length === 0) return;

      let newActiveIndex = -1;
      for (let i = 0; i < currentLyrics.length; i++) {
        if (localProgress >= currentLyrics[i].time) {
          newActiveIndex = i;
        } else {
          break;
        }
      }

      if (newActiveIndex !== activeLyricIndex && newActiveIndex !== -1) {
        if (activeLyricIndex !== -1) {
          const oldEl = document.getElementById(`lyric-${activeLyricIndex}`);
          if (oldEl) oldEl.classList.remove('active');
        }

        const newEl = document.getElementById(`lyric-${newActiveIndex}`);
        if (newEl) {
          newEl.classList.add('active');

          const containerHeight = document.getElementById('live-lyrics-container').clientHeight;
          const offset = newEl.offsetTop - (containerHeight / 2) + (newEl.clientHeight / 2);
          document.getElementById('lyrics-content').style.transform = `translateY(-${Math.max(0, offset)}px)`;
        }
        activeLyricIndex = newActiveIndex;
      }
    }

    // 8. INTERACTIVE HORIZONTAL VOLUME SIDE-SLIDER HANDLER
    const volumeBtn = document.getElementById('volume-btn');
    const volumeWrapper = document.getElementById('volume-wrapper');
    const volumeSliderContainer = document.getElementById('volume-slider-container');

    if (volumeBtn && volumeSliderContainer) {
      volumeBtn.addEventListener('click', (e) => {
        e.stopPropagation();

        const currentLeftEdge = window.screenX;
        const totalScreenWidth = window.screen.availWidth;
        const widgetWidth = window.outerWidth;
        const spaceOnRight = totalScreenWidth - (currentLeftEdge + widgetWidth);

        // Adaptive Check: If blocked on right, slide LEFT inside row layout
        if (spaceOnRight < 100) {
          volumeWrapper.classList.remove('expand-right');
          volumeWrapper.classList.add('expand-left');
        } else {
          volumeWrapper.classList.remove('expand-left');
          volumeWrapper.classList.add('expand-right');
        }

        volumeWrapper.classList.toggle('active');
      });

      document.addEventListener('click', (e) => {
        if (!volumeWrapper.contains(e.target)) {
          volumeWrapper.classList.remove('active');
        }
      });

      volumeSliderContainer.addEventListener('wheel', (e) => {
        if (e.deltaY < 0) {
          ipcRenderer.send('change-volume', 'up');
        } else {
          ipcRenderer.send('change-volume', 'down');
        }
      });
    }
  </script>
</body>

</html>
