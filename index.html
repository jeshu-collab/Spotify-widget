<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval'; img-src * data: blob:;">
  <link rel="stylesheet" href="style.css">
  <title>Spotify Widget</title>
</head>
<body>

  <div class="widget-container">
    <img id="album-art" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAGQAAABkAQMAAABpTeRvAAAABlBMVEUAAAD///+l2Z/dAAAAAXRSTlMAQObYZgAAABxJREFUeJztwQENAAAAwqD3P20ON6AAAAAAAADg1w1vAAABa9e6YAAAAABJRU5ErkJggg==" alt="Album Art">
    <div class="song-details">
      <h1 id="track-title">Waiting for Media...</h1>
      <h2 id="artist-name">Play a song!</h2>
      
      <div class="progress-container">
        <div id="progress-bar" style="width: 0%;"></div>
      </div>

      <div class="controls-container">
        <button class="control-btn" onclick="sendCommand('prev')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="white"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
        </button>
        <button id="play-pause-btn" class="control-btn play-btn" onclick="sendCommand('toggle')">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <button class="control-btn" onclick="sendCommand('next')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="white"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
        </button>
      </div>
    </div>
  </div>

  <script>
    const { ipcRenderer } = require('electron');

    // 60FPS Prediction Variables
    let currentProgress = 0;
    let currentDuration = 1;
    let lastUpdateTime = Date.now();
    let isPlaying = false;

    // Save the SVGs as variables
    const playIcon = '<svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg>';
    const pauseIcon = '<svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>';

    // 1. Receive absolute truth from the background worker
    ipcRenderer.on('update-track', (event, track) => {
      try {
        document.getElementById('track-title').innerText = track.title;
        document.getElementById('artist-name').innerText = track.artist;
        document.getElementById('album-art').src = track.albumArt;
        
        // --- THE FIX: Swap the Play/Pause Icon ---
        const btn = document.getElementById('play-pause-btn');
        if (track.isPlaying) {
          btn.innerHTML = pauseIcon;
        } else {
          btn.innerHTML = playIcon;
        }
        // -----------------------------------------

        // Sync our math variables
        currentProgress = track.progress;
        currentDuration = track.duration;
        isPlaying = track.isPlaying;
        lastUpdateTime = Date.now();
      } catch (error) {
        console.error("UI Error:", error);
      }
    });

    // 2. The Buttery Smooth Animation Loop
    function animateProgressBar() {
      if (isPlaying && currentDuration > 0) {
        const now = Date.now();
        const timePassed = now - lastUpdateTime;
        
        // Predict the song's position locally for 60fps smoothness
        const estimatedProgress = currentProgress + timePassed;
        let percentage = (estimatedProgress / currentDuration) * 100;
        
        if (percentage > 100) percentage = 100;
        document.getElementById('progress-bar').style.width = percentage + '%';
      }
      requestAnimationFrame(animateProgressBar);
    }
    
    animateProgressBar();

    // Beam commands up to main.js when buttons are clicked
    // Beam commands up to main.js when buttons are clicked
    function sendCommand(cmd) {
      ipcRenderer.send('media-command', cmd);

      // --- OPTIMISTIC UI INSTANT FEEDBACK ---
      // If we clicked play/pause, instantly flip the icon and freeze the progress bar
      // without waiting for Windows to confirm it!
      if (cmd === 'toggle') {
        const btn = document.getElementById('play-pause-btn');
        isPlaying = !isPlaying; // Instantly flip the math state
        btn.innerHTML = isPlaying ? pauseIcon : playIcon; // Instantly flip the icon
      }
    }
  </script>
</body>
</html>
