<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval'; img-src * data: blob:;">
  <link rel="stylesheet" href="style.css">
  <title>Spotify Widget</title>
</head>
<body>

  <div class="widget-container">
    <img id="album-art" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAGQAAABkAQMAAABpTeRvAAAABlBMVEUAAAD///+l2Z/dAAAAAXRSTlMAQObYZgAAABxJREFUeJztwQENAAAAwqD3P20ON6AAAAAAAADg1w1vAAABa9e6YAAAAABJRU5ErkJggg==" alt="Album Art">
    <div class="song-details">
      <h1 id="track-title">Waiting for Media...</h1>
      <h2 id="artist-name">Play a song!</h2>
      
      <div class="progress-container">
        <div id="progress-bar" style="width: 0%;"></div>
      </div>
      
      <div class="time-container">
        <span id="current-time">0:00</span>
        <span id="total-time">0:00</span>
      </div>

      <div class="controls-container">
        <button class="control-btn" onclick="sendCommand('prev')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="white"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
        </button>
        <button id="play-pause-btn" class="control-btn play-btn" onclick="sendCommand('toggle')">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <button class="control-btn" onclick="sendCommand('next')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="white"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
        </button>
      </div>
    </div>
  </div>

<script>
    const { ipcRenderer, clipboard } = require('electron');

    // 1. GAME LOOP VARIABLES
    let localProgress = 0;
    let currentDuration = 1000;
    let isPlaying = false;
    let lastFrameTime = Date.now();
    
    // Trackers to catch Spotify's lag
    let currentTrackTitle = "";
    let lastWindowsProgress = -1;

    const playIcon = '<svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg>';
    const pauseIcon = '<svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>';

    // 2. HELPER FUNCTIONS
    function formatTime(ms) {
      if (isNaN(ms) || ms <= 0) return "0:00";
      const totalSeconds = Math.floor(ms / 1000);
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = totalSeconds % 60;
      return `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
    }

    function updateVisuals() {
      document.getElementById('current-time').innerText = formatTime(localProgress);
      document.getElementById('total-time').innerText = formatTime(currentDuration);
      let percentage = (localProgress / currentDuration) * 100;
      if (percentage > 100) percentage = 100;
      document.getElementById('progress-bar').style.width = percentage + '%';
    }

    // 3. RECEIVE DATA FROM WINDOWS (THE IRONCLAD FILTER)
    ipcRenderer.on('update-track', (event, track) => {
      try {
        document.getElementById('track-title').innerText = track.title;
        document.getElementById('artist-name').innerText = track.artist;
        document.getElementById('album-art').src = track.albumArt;
        
        const btn = document.getElementById('play-pause-btn');
        btn.innerHTML = track.isPlaying ? pauseIcon : playIcon;

        currentDuration = track.duration;
        isPlaying = track.isPlaying;

        // THE FIX: Stale Data Rejection
        // If Spotify is sending the exact same time over and over, IGNORE IT.
        if (track.progress !== lastWindowsProgress || track.title !== currentTrackTitle) {
            
            const drift = Math.abs(track.progress - localProgress);
            
            // Only snap the bar if the song changed OR if you clicked a different part of the song (>3 seconds off)
            if (track.title !== currentTrackTitle || drift > 3000) {
                localProgress = track.progress;
                currentTrackTitle = track.title;
            }
            
            lastWindowsProgress = track.progress; // Save the new time
        }

      } catch (error) {
        console.error("UI Error:", error);
      }
    });

    // 4. THE 60FPS GAME LOOP
    function animateProgressBar() {
      const now = Date.now();
      const deltaTime = now - lastFrameTime;
      lastFrameTime = now; 

      if (isPlaying && currentDuration > 0) {
        localProgress += deltaTime;
        if (localProgress > currentDuration) localProgress = currentDuration;
        updateVisuals();
      } else if (!isPlaying) {
        updateVisuals(); // Lock the UI perfectly when paused
      }
      
      requestAnimationFrame(animateProgressBar);
    }
    
    animateProgressBar();

    // 5. BUTTON CONTROLS
    function sendCommand(cmd) {
      ipcRenderer.send('media-command', cmd);
      if (cmd === 'toggle') {
        const btn = document.getElementById('play-pause-btn');
        isPlaying = !isPlaying; 
        btn.innerHTML = isPlaying ? pauseIcon : playIcon; 
      }
    }

    // 6. QUICK SHARE
    function shareTrack() {
      const title = document.getElementById('track-title').innerText;
      const artist = document.getElementById('artist-name').innerText;
      if (title !== "Waiting for Media..." && title !== "Waiting for Spotify...") {
        clipboard.writeText(`🎵 Vibing to: ${title} - ${artist}`);
        const shareBtn = document.querySelector('.share-btn');
        const originalIcon = shareBtn.innerHTML;
        shareBtn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="#1DB954"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>';
        setTimeout(() => { shareBtn.innerHTML = originalIcon; }, 1500);
      }
    }

    // 7. LYRICS UI LOGIC (PHASE 1)
    let isLyricsOpen = false;

    function toggleLyrics() {
      const drawer = document.getElementById('lyrics-drawer');
      const btn = document.querySelector('.toggle-lyrics-btn');
      
      isLyricsOpen = !isLyricsOpen;
      
      if (isLyricsOpen) {
        drawer.classList.add('expanded');
        btn.classList.add('open');
      } else {
        drawer.classList.remove('expanded');
        btn.classList.remove('open');
      }
    }

    function fetchLyrics() {
      document.getElementById('lyrics-prompt').classList.add('hidden');
      document.getElementById('live-lyrics-container').classList.remove('hidden');
      console.log("User requested lyrics. Ready for Phase 2!");
    }
  </script>
</body>
</html>
